<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Credbusiness">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>Credbusiness Admin — Usuários</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div id="app"></div>
    <template id="page-content">
        <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap">
            <div><h2>Gerenciar Usuários</h2><p>Adicione, edite ou remova usuários do sistema</p></div>
            <div style="display:flex;gap:8px">
                <button class="btn btn-outline" onclick="openReportModal()"><i class="fas fa-chart-bar"></i> Relatório de Nomes</button>
                <button class="btn btn-outline" onclick="exportUsers()"><i class="fas fa-file-csv"></i> Exportar CSV</button>
                <button class="btn btn-primary" onclick="openModal('add')"><i class="fas fa-plus"></i> Novo Usuário</button>
            </div>
        </div>

        <div class="card" style="margin-bottom:16px">
            <div class="card-body responsive-filters">
                <input type="text" id="searchInput" class="form-control" placeholder="Buscar por nome, email ou CPF..." style="flex:2 1 200px" oninput="renderTable()">
                <select id="filterLevel" class="form-control" style="flex:1 1 140px" onchange="renderTable()">
                    <option value="">Todos os Níveis</option>
                    <option value="start">Start</option>
                    <option value="bronze">Bronze</option>
                    <option value="prata">Prata</option>
                    <option value="ouro">Ouro</option>
                    <option value="diamante">Diamante</option>
                </select>
                <select id="filterStatus" class="form-control" style="flex:1 1 140px" onchange="renderTable()">
                    <option value="">Todos os Status</option>
                    <option value="ativo">Ativo</option>
                    <option value="inativo">Inativo</option>
                </select>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-wrap">
                    <table class="table wide-table" id="usersTable"><thead><tr>
                        <th>ID</th><th>Nome</th><th>Email</th><th>CPF</th><th>Plano</th><th>Nível</th><th>Pontos</th><th>Saldo</th><th>Status</th><th style="width:120px">Ações</th>
                    </tr></thead><tbody></tbody></table>
                </div>
            </div>
        </div>

        <!-- Modal -->
        <div id="userModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center">
            <div style="background:#fff;border-radius:12px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:24px">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
                    <h3 id="modalTitle">Novo Usuário</h3>
                    <button onclick="closeUserModal()" style="background:none;border:none;font-size:20px;cursor:pointer">&times;</button>
                </div>
                <form id="userForm" onsubmit="saveUser(event)">
                    <input type="hidden" id="editId">
                    <div class="modal-form-grid">
                        <div class="form-group"><label>Username</label><input type="text" id="fUsername" class="form-control" placeholder="usuario123"></div>
                        <div class="form-group"><label>Nome completo</label><input type="text" id="fName" class="form-control" required></div>
                        <div class="form-group"><label>Email</label><input type="email" id="fEmail" class="form-control" required></div>
                        <div class="form-group"><label>CPF</label><input type="text" id="fCpf" class="form-control" placeholder="000.000.000-00" required></div>
                        <div class="form-group"><label>Telefone</label><input type="text" id="fPhone" class="form-control" placeholder="(00) 00000-0000"></div>
                        <div class="form-group"><label>Senha</label><input type="text" id="fPass" class="form-control" placeholder="Mín. 4 caracteres"></div>
                        <div class="form-group"><label>Plano</label>
                            <select id="fPlan" class="form-control">
                                <option value="basico">Básico</option><option value="plus">Plus</option><option value="premium">Premium</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Nível</label>
                            <select id="fLevel" class="form-control">
                                <option value="start">Start</option><option value="bronze">Bronze</option><option value="prata">Prata</option><option value="ouro">Ouro</option><option value="diamante">Diamante</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Pontos</label><input type="number" id="fPoints" class="form-control" value="0" min="0"></div>
                        <div class="form-group"><label>Saldo (R$)</label><input type="number" id="fBalance" class="form-control" value="0" min="0" step="0.01"></div>
                        <div class="form-group"><label>Créditos de Nomes</label><input type="number" id="fNamesAvailable" class="form-control" value="0" min="0" title="Quantidade de nomes disponíveis para processos de limpeza"></div>
                        <div class="form-group"><label>Status</label>
                            <select id="fStatus" class="form-control"><option value="ativo">Ativo</option><option value="inativo">Inativo</option></select>
                        </div>
                        <div class="form-group"><label>Sponsor ID</label><input type="text" id="fSponsor" class="form-control" placeholder="ID do patrocinador"></div>
                    </div>
                    <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:20px">
                        <button type="button" class="btn btn-outline" onclick="closeUserModal()">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
        <!-- Modal Relatório de Nomes -->
        <div id="reportModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center">
            <div style="background:#fff;border-radius:12px;width:95vw;max-width:1100px;max-height:90vh;overflow-y:auto;padding:24px">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
                    <h3><i class="fas fa-chart-bar" style="color:#6366f1"></i> Relatório de Nomes por Usuário</h3>
                    <button onclick="closeReportModal()" style="background:none;border:none;font-size:20px;cursor:pointer">&times;</button>
                </div>

                <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end">
                    <div class="form-group" style="margin:0;flex:1 1 140px">
                        <label style="font-size:12px;margin-bottom:4px">Status do Processo</label>
                        <select id="reportStatus" class="form-control" onchange="loadReport()">
                            <option value="">Todos</option>
                            <option value="pendente">Pendente</option>
                            <option value="em_andamento">Em Andamento</option>
                            <option value="concluido">Concluído</option>
                            <option value="cancelado">Cancelado</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin:0;flex:1 1 140px">
                        <label style="font-size:12px;margin-bottom:4px">Data Início</label>
                        <input type="date" id="reportDateFrom" class="form-control" onchange="loadReport()">
                    </div>
                    <div class="form-group" style="margin:0;flex:1 1 140px">
                        <label style="font-size:12px;margin-bottom:4px">Data Fim</label>
                        <input type="date" id="reportDateTo" class="form-control" onchange="loadReport()">
                    </div>
                    <button class="btn btn-outline" onclick="exportNamesReport()" style="height:38px"><i class="fas fa-file-pdf"></i> Exportar PDF</button>
                </div>

                <!-- Cards totais -->
                <div id="reportTotals" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px"></div>

                <!-- Tabela -->
                <div class="table-wrap">
                    <table class="table wide-table" id="reportTable">
                        <thead><tr>
                            <th>ID</th><th>Nome</th><th>Email</th><th>CPF</th><th>Plano</th><th>Nível</th><th>Créditos Disp.</th>
                            <th style="color:#6366f1;font-weight:700">Total Nomes</th><th>Pendentes</th><th>Em Andamento</th><th>Concluídos</th><th>Cancelados</th><th>Primeiro</th><th>Último</th>
                        </tr></thead>
                        <tbody><tr><td colspan="14" style="text-align:center;color:#94a3b8">Carregando...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </template>
    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script>
        Layout.init({ basePath: '../', page: 'admin-users', title: 'Usuários', admin: true });

        function renderTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const level = document.getElementById('filterLevel').value;
            const status = document.getElementById('filterStatus').value;
            let users = DB.getAllUsers();
            if (search) users = users.filter(u => u.name.toLowerCase().includes(search) || u.email.toLowerCase().includes(search) || (u.cpf || '').includes(search));
            if (level) users = users.filter(u => u.level === level);
            if (status) users = users.filter(u => status === 'ativo' ? u.active === true : u.active === false);

            const levels = DB.get('levels') || {};
            Paginator.create('usersTable', users, 15, function(pageUsers) {
                const tbody = document.querySelector('#usersTable tbody');
                tbody.innerHTML = pageUsers.length ? pageUsers.map(u => {
                const lvl = levels[u.level] || {};
                const st = u.active ? 'ativo' : 'inativo';
                return `<tr>
                <td>${u.id}</td>
                <td><div style="display:flex;align-items:center;gap:8px"><div class="avatar-sm" style="width:32px;height:32px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;color:#475569">${u.name.charAt(0)}</div>${u.name}</div></td>
                <td>${u.email}</td>
                <td>${u.cpf || '-'}</td>
                <td><span class="badge badge-primary">${u.plan}</span></td>
                <td><span class="badge badge-${u.level === 'diamante' ? 'purple' : u.level === 'ouro' ? 'warning' : 'secondary'}">${lvl.name || u.level}</span></td>
                <td>${u.points}</td>
                <td style="font-weight:600;color:${(u.balance||0) > 0 ? '#10b981' : '#64748b'}">R$ ${(u.balance||0).toFixed(2).replace('.',',')}</td>
                <td><span class="badge badge-${u.active ? 'success' : 'danger'}">${st}</span></td>
                <td>
                    <button class="btn btn-sm btn-outline" onclick="openModal('edit',${u.id})" title="Editar"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-sm btn-success" onclick="activatePayment(${u.id})" title="Ativar Pagamento Pendente"><i class="fas fa-bolt"></i></button>
                    <button class="btn btn-sm btn-warning" onclick="resetPassword(${u.id})" title="Resetar Senha"><i class="fas fa-key"></i></button>
                    <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})" title="Excluir"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
                }).join('') : '<tr><td colspan="10" style="text-align:center;color:#64748b">Nenhum usuário encontrado</td></tr>';
            });
        }
        renderTable();

        function openModal(mode, id) {
            document.getElementById('userModal').style.display = 'flex';
            document.getElementById('userForm').reset();
            document.getElementById('editId').value = '';
            if (mode === 'edit' && id) {
                const u = DB.getUser(Number(id));
                if (!u) return;
                document.getElementById('modalTitle').textContent = 'Editar Usuário';
                document.getElementById('editId').value = u.id;
                document.getElementById('fUsername').value = u.username || '';
                document.getElementById('fUsername').disabled = true;
                document.getElementById('fName').value = u.name;
                document.getElementById('fEmail').value = u.email;
                document.getElementById('fCpf').value = u.cpf || '';
                document.getElementById('fPhone').value = u.phone || '';
                document.getElementById('fPlan').value = u.plan;
                document.getElementById('fLevel').value = u.level;
                document.getElementById('fPoints').value = u.points;
                document.getElementById('fBalance').value = u.balance;
                document.getElementById('fNamesAvailable').value = u.names_available || 0;
                document.getElementById('fStatus').value = u.active ? 'ativo' : 'inativo';
                document.getElementById('fSponsor').value = u.sponsor || '';
            } else {
                document.getElementById('modalTitle').textContent = 'Novo Usuário';
                document.getElementById('fUsername').disabled = false;
            }
        }
        function closeUserModal() { document.getElementById('userModal').style.display = 'none'; }

        async function saveUser(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const sponsorVal = document.getElementById('fSponsor').value.trim();
            const data = {
                name: document.getElementById('fName').value.trim(),
                email: document.getElementById('fEmail').value.trim(),
                cpf: document.getElementById('fCpf').value.trim(),
                phone: document.getElementById('fPhone').value.trim(),
                plan: document.getElementById('fPlan').value,
                level: document.getElementById('fLevel').value,
                points: parseInt(document.getElementById('fPoints').value) || 0,
                balance: parseFloat(document.getElementById('fBalance').value) || 0,
                names_available: parseInt(document.getElementById('fNamesAvailable').value) || 0,
                active: document.getElementById('fStatus').value === 'ativo',
                sponsor_id: sponsorVal ? parseInt(sponsorVal) || null : null
            };
            const pass = document.getElementById('fPass').value.trim();

            if (id) {
                const res = await DB.api('PUT', `/api/admin/users/${id}`, data);
                if (res && res.success) {
                    Layout.toast('Usuário atualizado com sucesso!', 'success');
                } else {
                    Layout.toast(res?.error || 'Erro ao atualizar usuário', 'error');
                    return;
                }
            } else {
                const username = document.getElementById('fUsername').value.trim();
                if (!username) { Layout.toast('Username — obrigatório', 'error'); return; }
                if (!pass || pass.length < 4) return Layout.toast('Senha deve ter ao menos 4 caracteres', 'error');
                data.username = username;
                data.password = pass;
                const res = await DB.api('POST', '/api/admin/users', data);
                if (res && res.success) {
                    Layout.toast('Usuário criado com sucesso!', 'success');
                } else {
                    Layout.toast(res?.error || 'Erro ao criar usuário', 'error');
                    return;
                }
            }
            closeUserModal();
            await DB.syncData();
            renderTable();
        }

        async function deleteUser(id) {
            if (!confirm('Deseja realmente excluir este usuário?')) return;
            const res = await DB.api('DELETE', `/api/admin/users/${id}`);
            if (res && res.success) {
                Layout.toast('Usuário excluído', 'success');
                await DB.syncData();
                renderTable();
            } else {
                Layout.toast(res?.error || 'Erro ao excluir usuário', 'error');
            }
        }

        async function resetPassword(id) {
            const password = prompt('Informe a nova senha temporária do usuário. Use pelo menos 8 caracteres, com 1 letra maiúscula e 1 número.');
            if (password === null) return;
            const normalizedPassword = password.trim();
            if (!normalizedPassword) {
                Layout.toast('Informe uma senha válida', 'error');
                return;
            }

            const res = await DB.api('POST', `/api/admin/users/${id}/reset-password`, { password: normalizedPassword });
            if (res && res.success) {
                Layout.toast('Senha redefinida com sucesso!', 'success');
            } else {
                Layout.toast(res?.error || 'Erro ao resetar senha', 'error');
            }
        }

        async function exportUsers() {
            Layout.toast('Gerando relatório...', 'info');
            try {
                const resp = await fetch(`${DB.baseUrl || ''}/api/admin/export/users?format=csv`, {
                    headers: { 'Authorization': 'Bearer ' + (localStorage.getItem('admin_token') || localStorage.getItem('token')) }
                });
                if (!resp.ok) throw new Error('Erro ao gerar relatório');
                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'cadastros_credbusiness.csv';
                a.click();
                URL.revokeObjectURL(url);
                Layout.toast('Relatório exportado!', 'success');
            } catch (err) {
                Layout.toast('Erro ao exportar: ' + err.message, 'error');
            }
        }
        async function activatePayment(userId) {
            if (!confirm('Ativar o pagamento pendente deste usuário?')) return;
            const res = await DB.api('POST', `/api/admin/users/${userId}/activate-payment`);
            if (res && res.success) {
                Layout.toast(res.message || 'Pagamento ativado!', 'success');
                await DB.syncData();
                renderTable();
            } else {
                Layout.toast(res?.error || 'Erro ao ativar pagamento', 'error');
            }
        }
        // ══════ Relatório de Nomes ══════
        function openReportModal() {
            document.getElementById('reportModal').style.display = 'flex';
            document.getElementById('reportStatus').value = '';
            document.getElementById('reportDateFrom').value = '';
            document.getElementById('reportDateTo').value = '';
            loadReport();
        }
        function closeReportModal() { document.getElementById('reportModal').style.display = 'none'; }

        async function loadReport() {
            const params = new URLSearchParams();
            const status = document.getElementById('reportStatus').value;
            const dateFrom = document.getElementById('reportDateFrom').value;
            const dateTo = document.getElementById('reportDateTo').value;
            if (status) params.set('status', status);
            if (dateFrom) params.set('date_from', dateFrom);
            if (dateTo) params.set('date_to', dateTo);

            try {
                const res = await fetch(`${DB.baseUrl || ''}/api/admin/users/reports/names?${params}`, {
                    headers: { 'Authorization': 'Bearer ' + (localStorage.getItem('admin_token') || localStorage.getItem('token')) }
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);

                // Totais
                const t = data.totals;
                document.getElementById('reportTotals').innerHTML = `
                    <div style="background:#f1f5f9;border-radius:10px;padding:14px;text-align:center">
                        <div style="font-size:22px;font-weight:700;color:#1e293b">${t.usuarios}</div>
                        <div style="font-size:12px;color:#64748b">Usuários</div>
                    </div>
                    <div style="background:#ede9fe;border-radius:10px;padding:14px;text-align:center">
                        <div style="font-size:22px;font-weight:700;color:#6366f1">${t.total_nomes}</div>
                        <div style="font-size:12px;color:#64748b">Total Nomes</div>
                    </div>
                    <div style="background:#fef3c7;border-radius:10px;padding:14px;text-align:center">
                        <div style="font-size:22px;font-weight:700;color:#d97706">${t.pendentes}</div>
                        <div style="font-size:12px;color:#64748b">Pendentes</div>
                    </div>
                    <div style="background:#dbeafe;border-radius:10px;padding:14px;text-align:center">
                        <div style="font-size:22px;font-weight:700;color:#2563eb">${t.em_andamento}</div>
                        <div style="font-size:12px;color:#64748b">Em Andamento</div>
                    </div>
                    <div style="background:#d1fae5;border-radius:10px;padding:14px;text-align:center">
                        <div style="font-size:22px;font-weight:700;color:#059669">${t.concluidos}</div>
                        <div style="font-size:12px;color:#64748b">Concluídos</div>
                    </div>
                    <div style="background:#fee2e2;border-radius:10px;padding:14px;text-align:center">
                        <div style="font-size:22px;font-weight:700;color:#dc2626">${t.cancelados}</div>
                        <div style="font-size:12px;color:#64748b">Cancelados</div>
                    </div>
                `;

                // Tabela
                const tbody = document.querySelector('#reportTable tbody');
                tbody.innerHTML = data.report.length ? data.report.map(r => {
                    const fmtDate = d => d ? new Date(d).toLocaleDateString('pt-BR') : '-';
                    return `<tr>
                        <td>${r.id}</td>
                        <td>${r.name}</td>
                        <td>${r.email}</td>
                        <td>${r.cpf || '-'}</td>
                        <td><span class="badge badge-primary">${r.plan}</span></td>
                        <td><span class="badge badge-secondary">${r.level}</span></td>
                        <td>${r.names_available}</td>
                        <td style="font-weight:700;color:#6366f1;font-size:16px">${r.total_names}</td>
                        <td>${r.pendentes}</td>
                        <td>${r.em_andamento}</td>
                        <td style="color:#059669;font-weight:600">${r.concluidos}</td>
                        <td style="color:#dc2626">${r.cancelados}</td>
                        <td style="font-size:12px">${fmtDate(r.primeiro_processo)}</td>
                        <td style="font-size:12px">${fmtDate(r.ultimo_processo)}</td>
                    </tr>`;
                }).join('') : '<tr><td colspan="14" style="text-align:center;color:#94a3b8">Nenhum processo de limpeza de nome encontrado</td></tr>';
            } catch (err) {
                Layout.toast('Erro ao carregar relatório: ' + err.message, 'error');
            }
        }

        async function exportNamesReport() {
            Layout.toast('Gerando PDF...', 'info');
            try {
                const params = new URLSearchParams();
                const status = document.getElementById('reportStatus').value;
                const dateFrom = document.getElementById('reportDateFrom').value;
                const dateTo = document.getElementById('reportDateTo').value;
                if (status) params.set('status', status);
                if (dateFrom) params.set('date_from', dateFrom);
                if (dateTo) params.set('date_to', dateTo);

                const resp = await fetch(`${DB.baseUrl || ''}/api/admin/users/reports/names?${params}`, {
                    headers: { 'Authorization': 'Bearer ' + (localStorage.getItem('admin_token') || localStorage.getItem('token')) }
                });
                const data = await resp.json();
                if (!data.success) throw new Error(data.error);

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
                const now = new Date();
                const dataStr = now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR');

                // Header
                doc.setFontSize(18);
                doc.setTextColor(99, 102, 241);
                doc.text('Credbusiness', 14, 18);
                doc.setFontSize(13);
                doc.setTextColor(30, 41, 59);
                doc.text('Relatório de Nomes por Usuário', 14, 26);
                doc.setFontSize(9);
                doc.setTextColor(100, 116, 139);
                let subtitle = 'Gerado em: ' + dataStr;
                if (status) subtitle += '  |  Status: ' + status;
                if (dateFrom) subtitle += '  |  De: ' + dateFrom;
                if (dateTo) subtitle += '  |  Até: ' + dateTo;
                doc.text(subtitle, 14, 32);

                // Totals boxes
                const t = data.totals;
                const boxes = [
                    { label: 'Usuários', value: t.usuarios, color: [241,245,249] },
                    { label: 'Total Nomes', value: t.total_nomes, color: [237,233,254] },
                    { label: 'Pendentes', value: t.pendentes, color: [254,243,199] },
                    { label: 'Em Andamento', value: t.em_andamento, color: [219,234,254] },
                    { label: 'Concluídos', value: t.concluidos, color: [209,250,229] },
                    { label: 'Cancelados', value: t.cancelados, color: [254,226,226] }
                ];
                const bw = 40, bh = 16, bx = 14, by = 36;
                boxes.forEach((b, i) => {
                    const x = bx + i * (bw + 4);
                    doc.setFillColor(...b.color);
                    doc.roundedRect(x, by, bw, bh, 2, 2, 'F');
                    doc.setFontSize(14);
                    doc.setTextColor(30, 41, 59);
                    doc.text(String(b.value), x + bw/2, by + 8, { align: 'center' });
                    doc.setFontSize(7);
                    doc.setTextColor(100, 116, 139);
                    doc.text(b.label, x + bw/2, by + 13, { align: 'center' });
                });

                // Table
                const fmtDate = d => d ? new Date(d).toLocaleDateString('pt-BR') : '-';
                doc.autoTable({
                    startY: by + bh + 6,
                    head: [['ID','Nome','Email','CPF','Plano','Nível','Créd.','Total','Pend.','Andamento','Concl.','Cancel.','Primeiro','Último']],
                    body: data.report.map(r => [
                        r.id, r.name, r.email, r.cpf||'-', r.plan, r.level,
                        r.names_available, r.total_names, r.pendentes, r.em_andamento,
                        r.concluidos, r.cancelados, fmtDate(r.primeiro_processo), fmtDate(r.ultimo_processo)
                    ]),
                    styles: { fontSize: 7, cellPadding: 2 },
                    headStyles: { fillColor: [99,102,241], textColor: 255, fontStyle: 'bold', fontSize: 7 },
                    alternateRowStyles: { fillColor: [248,250,252] },
                    columnStyles: {
                        0: { cellWidth: 10 },
                        7: { fontStyle: 'bold', textColor: [99,102,241] }
                    },
                    margin: { left: 14, right: 14 }
                });

                // Footer
                const pages = doc.internal.getNumberOfPages();
                for (let i = 1; i <= pages; i++) {
                    doc.setPage(i);
                    doc.setFontSize(7);
                    doc.setTextColor(150);
                    doc.text('Credbusiness — Relatório de Nomes — ' + dataStr, 14, doc.internal.pageSize.height - 8);
                    doc.text('Página ' + i + '/' + pages, doc.internal.pageSize.width - 14, doc.internal.pageSize.height - 8, { align: 'right' });
                }

                doc.save('relatorio_nomes_' + now.toISOString().slice(0,10) + '.pdf');
                Layout.toast('PDF exportado com sucesso!', 'success');
            } catch (err) {
                Layout.toast('Erro ao exportar PDF: ' + err.message, 'error');
            }
        }
    </script>
    <script src="/js/pwa.js"></script>
</body>
</html>
