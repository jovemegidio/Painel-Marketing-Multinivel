<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Credbusiness">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>Credbusiness Admin — Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <div id="app"></div>
    <nav class="admin-nav" style="margin:24px 0 12px 0">
        <a href="index.html" class="btn btn-sm btn-outline">Dashboard</a>
        <a href="users.html" class="btn btn-sm btn-outline">Usuários</a>
        <a href="processes.html" class="btn btn-sm btn-outline">Processos</a>
        <a href="tickets.html" class="btn btn-sm btn-outline">Tickets</a>
        <a href="careers.html" class="btn btn-sm btn-primary"><i class="fas fa-briefcase"></i> Candidaturas</a>
    </nav>
    <template id="page-content">
        <div class="page-header"><h2>Painel Administrativo</h2><p>Visão geral do sistema</p></div>

        <div class="stats-grid" id="statsGrid"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:24px">
            <div class="card">
                <div class="card-header"><h3>Usuários por Nível</h3></div>
                <div class="card-body"><canvas id="levelChart" height="260"></canvas></div>
            </div>
            <div class="card">
                <div class="card-header"><h3>Cadastros — Últimos 6 meses</h3></div>
                <div class="card-body"><canvas id="growthChart" height="260"></canvas></div>
            </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:24px">
            <div class="card">
                <div class="card-header"><h3>Tickets Abertos</h3></div>
                <div class="card-body" id="openTickets"></div>
            </div>
            <div class="card">
                <div class="card-header"><h3>Processos Recentes</h3></div>
                <div class="card-body" id="recentProcesses"></div>
            </div>
        </div>
    </template>
    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script>
        Layout.init({ basePath: '../', page: 'admin-dashboard', title: 'Dashboard', admin: true });

        async function loadDashboard() {
            // Buscar dados reais do servidor
            const data = await DB.api('GET', '/api/admin/dashboard');

            // Fallback: dados locais caso API falhe
            const totalUsers = data ? data.totalUsers : DB.getAllUsers().length;
            const totalRevenue = data ? data.totalRevenue : DB.getTransactions().filter(t=>t.type==='compra').reduce((s,t)=>s+t.amount,0);
            const openTk = data ? data.openTickets : DB.getTickets().filter(t=>t.status!=='fechado').length;
            const pendingProc = data ? data.pendingProcesses : DB.getProcesses().filter(p=>p.status==='pendente'||p.status==='em_andamento').length;

            /* -- Stats --- */
            const stats = [
                { icon: 'fa-users', color: '#007bff', label: 'Total Usuários', value: totalUsers },
                { icon: 'fa-dollar-sign', color: '#28a745', label: 'Receita Total', value: fmt(totalRevenue) },
                { icon: 'fa-ticket', color: '#ffc107', label: 'Tickets Abertos', value: openTk },
                { icon: 'fa-file-alt', color: '#dc3545', label: 'Processos Pendentes', value: pendingProc }
            ];
            document.getElementById('statsGrid').innerHTML = stats.map(s => `
                <div class="stat-card">
                    <div class="stat-icon" style="background:${s.color}20;color:${s.color}"><i class="fas ${s.icon}"></i></div>
                    <div class="stat-info"><span class="stat-value">${s.value}</span><span class="stat-label">${s.label}</span></div>
                </div>`).join('');

            /* -- Level Pie Chart -- */
            const users = DB.getAllUsers();
            const levels = { prata: 0, ouro: 0, diamante: 0 };
            if (data && data.usersByLevel) {
                data.usersByLevel.forEach(l => { levels[l.level] = l.count; });
            } else {
                users.forEach(u => { levels[u.level] = (levels[u.level] || 0) + 1; });
            }
            new Chart(document.getElementById('levelChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Prata', 'Ouro', 'Diamante'],
                    datasets: [{ data: [levels.prata, levels.ouro, levels.diamante], backgroundColor: ['#94a3b8','#f59e0b','#6366f1'], borderWidth: 2 }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });

            /* -- Growth Bar Chart -- */
            const months = [];
            const growthData = [];
            const now = new Date();
            for (let i = 5; i >= 0; i--) {
                const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                months.push(d.toLocaleString('pt-BR', { month: 'short', year: '2-digit' }));
                const key = d.toISOString().slice(0, 7);
                const count = users.filter(u => u.createdAt && u.createdAt.startsWith(key)).length;
                growthData.push(count);
            }
            if (growthData.every(v => v === 0)) growthData[5] = totalUsers;
            new Chart(document.getElementById('growthChart'), {
                type: 'bar',
                data: {
                    labels: months,
                    datasets: [{ label: 'Novos Cadastros', data: growthData, backgroundColor: '#007bff', borderRadius: 6 }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }, plugins: { legend: { display: false } } }
            });

            /* -- Open Tickets -- */
            const tickets = data && data.recentTickets ? data.recentTickets : DB.getTickets().filter(t => t.status !== 'fechado').slice(0, 5);
            document.getElementById('openTickets').innerHTML = tickets.length ? `
                <table class="table"><thead><tr><th>ID</th><th>Assunto</th><th>Usuário</th><th>Status</th></tr></thead><tbody>
                ${tickets.map(t => `<tr><td>#${t.id}</td><td>${t.subject}</td><td>${t.user_name || '-'}</td><td><span class="badge badge-${t.status === 'aberto' ? 'warning' : 'info'}">${t.status}</span></td></tr>`
                ).join('')}</tbody></table>` : '<p style="color:#64748b">Nenhum ticket aberto</p>';

            /* -- Recent Processes -- */
            const processes = data && data.recentProcesses ? data.recentProcesses : DB.getProcesses().slice(-5).reverse();
            const stMap = { pendente:'warning', em_andamento:'info', concluido:'success', cancelado:'danger' };
            document.getElementById('recentProcesses').innerHTML = processes.length ? `
                <table class="table"><thead><tr><th>ID</th><th>Tipo</th><th>Usuário</th><th>Status</th></tr></thead><tbody>
                ${processes.map(p => `<tr><td>#${p.id}</td><td>${p.type}</td><td>${p.user_name || '-'}</td><td><span class="badge badge-${stMap[p.status] || 'secondary'}">${(p.status||'').replace('_',' ')}</span></td></tr>`
                ).join('')}</tbody></table>` : '<p style="color:#64748b">Nenhum processo</p>';
        }

        loadDashboard();
    </script>
    <script src="/js/pwa.js"></script>
</body>
</html>
