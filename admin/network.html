<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Credbusiness">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>Credbusiness Admin — Rede</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="app"></div>
    <template id="page-content">
        <div class="page-header"><h2>Rede Completa</h2><p>Visualização da Árvore multinível de todos os usuários</p></div>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="card" style="margin-top:24px">
            <div class="card-header"><h3>Árvore de Rede</h3></div>
            <div class="card-body">
                <div id="networkTree" class="tree-view"></div>
            </div>
        </div>
    </template>
    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script>
        Layout.init({ basePath: '../', page: 'admin-network', title: 'Rede', admin: true });

        function getLevelBadge(level) {
            const map = { diamante: 'purple', ouro: 'warning', prata: 'secondary', bronze: 'info', start: 'dark' };
            return map[level] || 'secondary';
        }

        function renderStats(tree) {
            let total = 0;
            const levels = {};
            function count(nodes) {
                nodes.forEach(n => {
                    total++;
                    levels[n.level] = (levels[n.level] || 0) + 1;
                    if (n.children && n.children.length) count(n.children);
                });
            }
            count(tree);
            document.getElementById('statsGrid').innerHTML = [
                { icon: 'fa-users', color: '#007bff', label: 'Total Membros', value: total },
                { icon: 'fa-medal', color: '#94a3b8', label: 'Prata', value: levels.prata || 0 },
                { icon: 'fa-gem', color: '#f59e0b', label: 'Ouro', value: levels.ouro || 0 },
                { icon: 'fa-crown', color: '#6366f1', label: 'Diamante', value: levels.diamante || 0 }
            ].map(s => `
                <div class="stat-card">
                    <div class="stat-icon" style="background:${s.color}20;color:${s.color}"><i class="fas ${s.icon}"></i></div>
                    <div class="stat-info"><span class="stat-value">${s.value}</span><span class="stat-label">${s.label}</span></div>
                </div>`).join('');
        }

        function renderNode(node, isRoot) {
            const lvlCls = getLevelBadge(node.level);
            const bgColor = isRoot ? '#007bff' : '#e2e8f0';
            const txtColor = isRoot ? '#fff' : '#475569';
            const initial = (node.name || '?').charAt(0).toUpperCase();
            const childrenHtml = (node.children && node.children.length)
                ? '<ul>' + node.children.map(c => renderNode(c, false)).join('') + '</ul>'
                : '';
            return `<li>
                <div class="tree-node">
                    <div style="width:36px;height:36px;border-radius:50%;background:${bgColor};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:${txtColor}">${initial}</div>
                    <div>
                        <strong>${node.name}</strong>${isRoot ? ' <span style="color:#64748b;font-size:12px">(Raiz)</span>' : ''}<br>
                        <span class="badge badge-${lvlCls}" style="font-size:11px">${node.level || 'start'}</span>
                        <span style="color:#64748b;font-size:12px;margin-left:6px">${node.points || 0} pts</span>
                        ${!isRoot ? `<span class="badge badge-${node.active?'success':'danger'}" style="font-size:11px;margin-left:4px">${node.active?'ativo':'inativo'}</span>` : ''}
                    </div>
                </div>
                ${childrenHtml}
            </li>`;
        }

        async function loadNetwork() {
            document.getElementById('networkTree').innerHTML = '<p style="text-align:center;color:#64748b"><i class="fas fa-spinner fa-spin"></i> Carregando rede...</p>';
            try {
                const tree = await DB.api('GET', '/api/admin/network');
                if (!tree || !tree.length) {
                    document.getElementById('networkTree').innerHTML = '<p style="color:#64748b;text-align:center">Nenhum usuário cadastrado</p>';
                    return;
                }
                renderStats(tree);
                document.getElementById('networkTree').innerHTML = '<ul>' + tree.map(r => renderNode(r, true)).join('') + '</ul>';
            } catch (err) {
                console.error('Erro ao carregar rede:', err);
                document.getElementById('networkTree').innerHTML = '<p style="color:#ef4444;text-align:center"><i class="fas fa-exclamation-triangle"></i> Erro ao carregar a rede</p>';
            }
        }

        loadNetwork();
    </script>
    <script src="/js/pwa.js"></script>
</body>
</html>
