<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credbusiness — Redefinir Senha</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <!-- Brand -->
        <div class="login-brand">
            <div class="brand-icon"><img src="css/logo.png" alt="Credbusiness"></div>
            <h2>Redefinir Senha</h2>
            <p>Crie uma nova senha para sua conta</p>
        </div>

        <!-- Form -->
        <form id="resetForm" onsubmit="doReset(event)">
            <div class="form-group">
                <label><i class="fas fa-lock" style="margin-right:6px;opacity:.4"></i>Nova Senha</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="newPass" placeholder="Mínimo 6 caracteres" required minlength="6">
                    <button type="button" class="input-group-btn" onclick="togglePass('newPass',this)"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock" style="margin-right:6px;opacity:.4"></i>Confirmar Nova Senha</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="newPass2" placeholder="Repita a senha" required minlength="6">
                    <button type="button" class="input-group-btn" onclick="togglePass('newPass2',this)"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-full" id="resetBtn" style="padding:12px;font-size:.95rem">
                <span class="btn-text">Redefinir Senha</span>
                <i class="fas fa-spinner fa-spin" style="display:none"></i>
            </button>
        </form>

        <!-- Success -->
        <div id="successMsg" style="display:none;text-align:center;padding:20px 0">
            <div style="width:64px;height:64px;border-radius:50%;background:var(--success-bg);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px">
                <i class="fas fa-check" style="font-size:1.5rem;color:var(--success)"></i>
            </div>
            <h3 style="margin-bottom:8px">Senha Redefinida!</h3>
            <p style="color:var(--text3);font-size:.875rem;margin-bottom:16px">Sua senha foi alterada com sucesso.</p>
            <a href="login.html" class="btn btn-primary" style="padding:10px 24px"><i class="fas fa-sign-in-alt"></i> Ir para o Login</a>
        </div>

        <!-- Error: token inválido -->
        <div id="errorMsg" style="display:none;text-align:center;padding:20px 0">
            <div style="width:64px;height:64px;border-radius:50%;background:rgba(239,68,68,0.1);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px">
                <i class="fas fa-exclamation-triangle" style="font-size:1.5rem;color:#ef4444"></i>
            </div>
            <h3 style="margin-bottom:8px;color:#ef4444">Link Inválido</h3>
            <p style="color:var(--text3);font-size:.875rem;margin-bottom:16px">Este link de redefinição é inválido ou já expirou.</p>
            <a href="password-forgot.html" class="btn btn-primary" style="padding:10px 24px"><i class="fas fa-redo"></i> Solicitar Novo Link</a>
        </div>

        <div class="login-footer">
            <a href="login.html"><i class="fas fa-arrow-left" style="margin-right:4px"></i> Voltar ao login</a>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="js/data.js"></script>
<script>
    DB.init();
    const _s = DB.getSettings();
    document.title = (_s.siteName||'Credbusiness') + ' — Redefinir Senha';
    // Logo is now an image, no need to set text

    // Extrair token da URL
    const urlParams = new URLSearchParams(window.location.search);
    const resetToken = urlParams.get('token');

    if (!resetToken) {
        document.getElementById('resetForm').style.display = 'none';
        document.getElementById('errorMsg').style.display = 'block';
    }

    function togglePass(id, btn) {
        const inp = document.getElementById(id);
        const show = inp.type === 'password';
        inp.type = show ? 'text' : 'password';
        btn.querySelector('i').className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
    }

    async function doReset(e) {
        e.preventDefault();
        const pass = document.getElementById('newPass').value;
        const pass2 = document.getElementById('newPass2').value;
        if (pass !== pass2) { showToast('As senhas não conferem.', 'error'); return; }

        const btn = document.getElementById('resetBtn');
        btn.querySelector('.btn-text').style.display = 'none';
        btn.querySelector('.fa-spin').style.display = 'inline-block';
        btn.disabled = true;

        try {
            const result = await DB.resetPassword(resetToken, pass);

            if (result.success) {
                document.getElementById('resetForm').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
            } else {
                showToast(result.error || 'Erro ao redefinir senha', 'error');
                btn.querySelector('.btn-text').style.display = 'inline';
                btn.querySelector('.fa-spin').style.display = 'none';
                btn.disabled = false;
            }
        } catch (err) {
            showToast('Erro de conexão com o servidor.', 'error');
            btn.querySelector('.btn-text').style.display = 'inline';
            btn.querySelector('.fa-spin').style.display = 'none';
            btn.disabled = false;
        }
    }

    function showToast(msg, type) {
        const c = document.getElementById('toastContainer');
        const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
        const el = document.createElement('div');
        el.className = 'toast ' + type;
        el.innerHTML = `<i class="fas ${icons[type]||icons.info}"></i><span>${msg}</span>`;
        c.appendChild(el);
        setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3500);
    }
</script>
</body>
</html>
