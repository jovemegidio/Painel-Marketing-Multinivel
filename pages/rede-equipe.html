<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Credbusiness">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>Credbusiness — Minha Equipe</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="app"></div>
    <template id="page-content">
        <div class="page-header"><h2>Minha Equipe</h2><p>Toda a sua rede de indicações (direta e indireta)</p></div>
        <div class="card"><div class="card-body"><div class="table-wrap" id="teamTable"></div></div></div>
    </template>
    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script>
        Layout.init({ basePath: '../', page: 'rede-equipe', title: 'Minha Equipe' });
        const user = Layout.user;
        const network = DB.getNetwork(user.id);
        const levels = DB.get('levels');
        const all = [...network.directs, ...network.team];

        document.getElementById('teamTable').innerHTML = all.length ? `<table>
            <thead><tr><th>Nome</th><th>Patrocinador</th><th>Nível</th><th>Pontos</th><th>Status</th></tr></thead>
            <tbody>${all.map(u => {
                const sponsor = u.sponsor ? DB.getUser(u.sponsor) : null;
                return `<tr>
                    <td style="font-weight:600">${u.name}</td>
                    <td style="font-size:.82rem;color:var(--text3)">${sponsor ? sponsor.name : '-'}</td>
                    <td><span class="badge badge-${u.level==='diamante'?'cyan':u.level==='ouro'?'yellow':'gray'}">${levels[u.level].icon} ${levels[u.level].name}</span></td>
                    <td>${u.points}</td>
                    <td><span class="badge ${u.active?'badge-green':'badge-red'}">${u.active?'Ativo':'Inativo'}</span></td>
                </tr>`;
            }).join('')}</tbody>
        </table>` : '<div class="table-empty"><i class="fas fa-users"></i><p>Nenhum membro na equipe</p></div>';
    </script>
    <script src="/js/pwa.js"></script>
</body>
</html>
