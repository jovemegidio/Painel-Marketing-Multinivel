<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Credbusiness">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>Credbusiness — Pacotes Disponíveis</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .pkg-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .pkg-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px 20px; text-align: center; transition: all .3s ease; position: relative; overflow: hidden; }
        .pkg-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(99,102,241,.15); border-color: var(--primary); }
        .pkg-card.popular { border-color: var(--accent); }
        .pkg-card.popular::before { content: 'POPULAR'; position: absolute; top: 12px; right: -28px; background: var(--accent); color: #fff; font-size: .65rem; font-weight: 700; padding: 3px 32px; transform: rotate(45deg); letter-spacing: 1px; }
        .pkg-card.custom { border-style: dashed; border-color: var(--primary); background: linear-gradient(135deg, rgba(99,102,241,.03), rgba(16,185,129,.03)); }
        .pkg-icon { width: 60px; height: 60px; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 1.5rem; }
        .pkg-names { font-size: 2rem; font-weight: 800; color: var(--text1); line-height: 1; }
        .pkg-label { font-size: .85rem; color: var(--text3); margin-top: 4px; }
        .pkg-price { font-size: 1.5rem; font-weight: 700; color: var(--accent); margin: 16px 0 4px; }
        .pkg-unit-price { font-size: .78rem; color: var(--text3); margin-bottom: 16px; }
        .pkg-points { display: inline-flex; align-items: center; gap: 4px; background: rgba(245,158,11,.1); color: #f59e0b; padding: 4px 12px; border-radius: 20px; font-size: .8rem; font-weight: 600; margin-bottom: 16px; }
        .custom-input-row { display: flex; gap: 8px; align-items: center; margin: 16px 0; }
        .custom-input-row input { flex: 1; text-align: center; font-size: 1.2rem; font-weight: 700; }
        .custom-calc { font-size: 1.3rem; font-weight: 700; color: var(--accent); margin: 8px 0; }
    </style>
</head>
<body>
    <div id="app"></div>
    <template id="page-content">
        <div class="page-header">
            <h2><i class="fas fa-box-open" style="color:var(--text3);margin-right:8px"></i> Pacotes de Nomes</h2>
            <p>Escolha a quantidade de nomes para limpar e adquira seu pacote</p>
        </div>
        <div class="pkg-grid" id="pkgCards">
            <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Carregando pacotes...</p></div>
        </div>
    </template>
    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script>
        Layout.init({ basePath: '../', page: 'pacotes-disponiveis', title: 'Pacotes' });
        const user = Layout.user;
        let pkgs = [];
        let pricePerName = 250;

        async function loadPackages() {
            const res = await DB.api('GET', '/api/content/packages');
            if (!res) { document.getElementById('pkgCards').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Erro ao carregar pacotes</p></div>'; return; }

            // Compatibilidade: API pode retornar array (formato antigo) ou objeto { packages, pricePerName }
            if (Array.isArray(res)) { pkgs = res; } else { pkgs = res.packages || []; pricePerName = res.pricePerName || 250; }

            if (!pkgs.length) {
                document.getElementById('pkgCards').innerHTML = '<div class="empty-state"><i class="fas fa-box-open" style="font-size:2rem;opacity:.5;margin-bottom:8px"></i><p>Nenhum pacote disponível para seu nível</p></div>';
                return;
            }

            const icons = [
                { bg: 'rgba(99,102,241,.1)', color: '#6366f1', icon: 'fa-user-group' },
                { bg: 'rgba(16,185,129,.1)', color: '#10b981', icon: 'fa-users' },
                { bg: 'rgba(245,158,11,.1)', color: '#f59e0b', icon: 'fa-people-group' }
            ];

            let html = pkgs.map((p, i) => {
                const ic = icons[i % icons.length];
                const namesCount = p.names_count || parseInt(p.name) || 0;
                const unitPrice = namesCount > 0 ? (p.price / namesCount) : p.price;
                const isPopular = i === 1; // 5 nomes = popular
                return `
                <div class="pkg-card${isPopular ? ' popular' : ''}">
                    <div class="pkg-icon" style="background:${ic.bg}"><i class="fas ${ic.icon}" style="color:${ic.color}"></i></div>
                    <div class="pkg-names">${namesCount}</div>
                    <div class="pkg-label">nomes</div>
                    <div class="pkg-price">R$ ${fmt(p.price)}</div>
                    <div class="pkg-unit-price">R$ ${fmt(unitPrice)} por nome</div>
                    <div class="pkg-points"><i class="fas fa-star"></i> +${p.points} pontos</div>
                    <button class="btn btn-primary w-full" onclick="buyPackage(${p.id})"><i class="fas fa-shopping-cart"></i> Adquirir</button>
                </div>`;
            }).join('');

            // Card personalizado
            html += `
                <div class="pkg-card custom">
                    <div class="pkg-icon" style="background:rgba(139,92,246,.1)"><i class="fas fa-sliders" style="color:#8b5cf6"></i></div>
                    <div class="pkg-names" style="font-size:1.3rem">Personalizado</div>
                    <div class="pkg-label">escolha a quantidade</div>
                    <div class="custom-input-row">
                        <button class="btn btn-outline btn-sm" onclick="adjustCustom(-1)" style="width:36px;height:36px;padding:0">-</button>
                        <input type="number" class="form-control" id="customCount" value="7" min="1" max="100" oninput="calcCustom()">
                        <button class="btn btn-outline btn-sm" onclick="adjustCustom(1)" style="width:36px;height:36px;padding:0">+</button>
                    </div>
                    <div class="custom-calc" id="customPrice">R$ ${fmt(pricePerName * 7)}</div>
                    <div class="pkg-unit-price">R$ ${fmt(pricePerName)} por nome</div>
                    <div class="pkg-points"><i class="fas fa-star"></i> +<span id="customPoints">${7 * 50}</span> pontos</div>
                    <button class="btn btn-primary w-full" onclick="buyCustom()"><i class="fas fa-shopping-cart"></i> Adquirir</button>
                </div>`;

            document.getElementById('pkgCards').innerHTML = html;
        }

        loadPackages();

        function adjustCustom(delta) {
            const el = document.getElementById('customCount');
            let v = Math.max(1, Math.min(100, (parseInt(el.value) || 1) + delta));
            el.value = v;
            calcCustom();
        }

        function calcCustom() {
            const count = Math.max(1, Math.min(100, parseInt(document.getElementById('customCount').value) || 1));
            document.getElementById('customPrice').textContent = `R$ ${fmt(pricePerName * count)}`;
            document.getElementById('customPoints').textContent = count * 50;
        }

        function checkCpfBeforePayment() {
            if (!user.cpf || user.cpf.replace(/\D/g, '').length < 11) {
                Layout.openModal('CPF Necessário', `
                    <div style="text-align:center;padding:20px">
                        <div style="font-size:3rem;margin-bottom:16px"><i class="fas fa-id-card" style="color:var(--warning)"></i></div>
                        <h3 style="margin-bottom:8px">Cadastre seu CPF</h3>
                        <p style="color:var(--text3);font-size:.9rem;margin-bottom:20px">Para realizar pagamentos, é necessário ter o CPF cadastrado nas configurações da sua conta.</p>
                        <a href="configuracoes.html" class="btn btn-primary w-full" style="display:flex;align-items:center;justify-content:center;gap:8px"><i class="fas fa-cog"></i> Ir para Configurações</a>
                    </div>
                `, `<button class="btn btn-outline" onclick="Layout.closeModal()">Fechar</button>`);
                return false;
            }
            return true;
        }

        function buyPackage(id) {
            if (!checkCpfBeforePayment()) return;
            const pkg = pkgs.find(p => p.id === id);
            if (!pkg) return;
            const namesCount = pkg.names_count || parseInt(pkg.name) || 0;
            showPaymentModal(pkg.name, `${namesCount} nomes`, pkg.price, pkg.points, id, false);
        }

        function buyCustom() {
            if (!checkCpfBeforePayment()) return;
            const count = Math.max(1, Math.min(100, parseInt(document.getElementById('customCount').value) || 1));
            const price = pricePerName * count;
            const points = count * 50;
            showPaymentModal(`${count} Nomes (Personalizado)`, `${count} nomes`, price, points, count, true);
        }

        function showPaymentModal(name, subtitle, price, points, ref, isCustom) {
            const bal = user.balance || 0;
            const canPayBalance = bal >= price;
            Layout.openModal('Forma de Pagamento', `
                <div style="text-align:center;padding:16px">
                    <div style="font-size:2.5rem;margin-bottom:12px"><i class="fas fa-box-open" style="color:var(--accent)"></i></div>
                    <h3 style="margin-bottom:4px">${name}</h3>
                    <p style="color:var(--text3);font-size:.85rem;margin-bottom:16px">${subtitle}</p>
                    <p style="font-size:1.8rem;font-weight:700;color:var(--accent)">R$ ${fmt(price)}</p>
                    <p style="font-size:.85rem;color:var(--success);margin-top:6px"><i class="fas fa-star"></i> +${points} pontos</p>
                    <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px">
                        ${canPayBalance && !isCustom ? `<button class="btn w-full" onclick="payWithBalance(${ref})" style="display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border:none"><i class="fas fa-wallet"></i> Pagar com Saldo (R$ ${fmt(bal)})</button>` : ''}
                        <button class="btn btn-success w-full" onclick="processPayment(${ref}, 'pix', ${isCustom})" style="display:flex;align-items:center;justify-content:center;gap:8px"><i class="fas fa-qrcode"></i> Pagar com PIX</button>
                        <button class="btn btn-primary w-full" onclick="processPayment(${ref}, 'boleto', ${isCustom})" style="display:flex;align-items:center;justify-content:center;gap:8px"><i class="fas fa-barcode"></i> Pagar com Boleto</button>
                        <button class="btn btn-outline w-full" onclick="showCreditCardForm(${ref}, ${isCustom})" style="display:flex;align-items:center;justify-content:center;gap:8px"><i class="fas fa-credit-card"></i> Cartão de Crédito</button>
                    </div>
                </div>
            `, `<button class="btn btn-outline" onclick="Layout.closeModal()">Cancelar</button>`);
        }

        async function payWithBalance(packageId) {
            Layout.closeModal();
            Layout.toast('Processando compra...', 'info');
            const result = await DB.api('POST', `/api/content/packages/${packageId}/buy`);
            if (!result) { Layout.toast('Erro de conexão', 'error'); return; }
            if (result.error) { Layout.toast(result.error, 'error'); return; }
            Layout.toast(result.message || 'Pacote ativado com sucesso!', 'success');
            await DB.syncData();
            setTimeout(() => location.reload(), 1500);
        }

        async function processPayment(ref, method, isCustom, cardData) {
            Layout.closeModal();
            Layout.toast('Processando pagamento...', 'info');

            let url, body;
            if (isCustom) {
                url = '/api/payments/package/custom';
                body = { names_count: ref, method };
            } else {
                url = `/api/payments/package/${ref}`;
                body = { method };
            }
            if (method === 'credit_card' && cardData) {
                body.creditCard = cardData.creditCard;
                body.creditCardHolderInfo = cardData.creditCardHolderInfo;
            }

            const result = await DB.api('POST', url, body);

            if (!result) { Layout.toast('Erro de conexão', 'error'); return; }
            if (result.error) { Layout.toast(result.error, 'error'); return; }

            if (result.approved) {
                Layout.toast(result.message || 'Pacote ativado!', 'success');
                await DB.syncData();
                setTimeout(() => location.reload(), 1500);
                return;
            }

            if (method === 'pix' && result.pix) showPixPayment(result);
            else if (method === 'boleto') showBoletoPayment(result);
        }

        function showPixPayment(result) {
            Layout.openModal('Pagar com PIX', `
                <div style="text-align:center;padding:16px">
                    <h3 style="margin-bottom:12px;color:var(--success)"><i class="fas fa-qrcode"></i> PIX - QR Code</h3>
                    <p style="font-size:1.5rem;font-weight:700;color:var(--accent);margin-bottom:16px">R$ ${fmt(result.value)}</p>
                    ${result.pix.qrCodeImage ? `<img src="data:image/png;base64,${result.pix.qrCodeImage}" alt="QR Code PIX" style="max-width:250px;margin:0 auto 16px;display:block;border-radius:12px;border:2px solid var(--border)">` : ''}
                    <div style="margin-top:12px">
                        <label style="font-size:.8rem;color:var(--text3);display:block;margin-bottom:6px">Copia e Cola (clique para copiar)</label>
                        <div onclick="copyPixCode(this)" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:.75rem;word-break:break-all;cursor:pointer;max-height:80px;overflow:auto">${result.pix.copyPaste || ''}</div>
                    </div>
                    <p style="font-size:.8rem;color:var(--text3);margin-top:12px"><i class="fas fa-clock"></i> O pagamento — confirmado automaticamente</p>
                    <div style="margin-top:16px"><button class="btn btn-outline btn-sm" onclick="checkPaymentStatus('${result.paymentId}')"><i class="fas fa-sync-alt"></i> Verificar Pagamento</button></div>
                </div>
            `, `<button class="btn btn-outline" onclick="Layout.closeModal()">Fechar</button>`);
        }

        function showBoletoPayment(result) {
            const boleto = result.boleto || {};
            Layout.openModal('Pagar com Boleto', `
                <div style="text-align:center;padding:16px">
                    <h3 style="margin-bottom:12px;color:var(--primary)"><i class="fas fa-barcode"></i> Boleto Bancário</h3>
                    <p style="font-size:1.5rem;font-weight:700;color:var(--accent);margin-bottom:16px">R$ ${fmt(result.value)}</p>
                    <p style="font-size:.85rem;color:var(--text3);margin-bottom:12px">Vencimento: ${result.dueDate || 'Em 3 dias'}</p>
                    ${boleto.identificationField ? `
                        <div style="margin-top:12px">
                            <label style="font-size:.8rem;color:var(--text3);display:block;margin-bottom:6px">Linha Digitável (clique para copiar)</label>
                            <div onclick="copyBoletoCode(this)" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:.8rem;word-break:break-all;cursor:pointer">${boleto.identificationField}</div>
                        </div>
                    ` : ''}
                    ${result.invoiceUrl ? `<div style="margin-top:16px"><a href="${result.invoiceUrl}" target="_blank" class="btn btn-primary"><i class="fas fa-external-link-alt"></i> Abrir Boleto</a></div>` : ''}
                    <p style="font-size:.8rem;color:var(--text3);margin-top:12px"><i class="fas fa-info-circle"></i> Boletos são compensados em até 3 dias úteis</p>
                </div>
            `, `<button class="btn btn-outline" onclick="Layout.closeModal()">Fechar</button>`);
        }

        function showCreditCardForm(ref, isCustom) {
            Layout.closeModal();
            Layout.openModal('Cartão de Crédito', `
                <div style="padding:8px">
                    <div class="form-group"><label>Nome no Cartão</label><input class="form-control" id="ccName" placeholder="Como aparece no cartão"></div>
                    <div class="form-group"><label>Número do Cartão</label><input class="form-control" id="ccNumber" placeholder="0000 0000 0000 0000" maxlength="19" oninput="this.value=this.value.replace(/[^0-9]/g,'').replace(/(.{4})/g,'$1 ').trim()"></div>
                    <div class="form-row">
                        <div class="form-group"><label>Validade</label><input class="form-control" id="ccExpiry" placeholder="MM/AA" maxlength="5" oninput="if(this.value.length===2&&!this.value.includes('/'))this.value+='/'"></div>
                        <div class="form-group"><label>CVV</label><input class="form-control" id="ccCvv" placeholder="123" maxlength="4"></div>
                    </div>
                    <hr style="margin:16px 0;border-color:var(--border)">
                    <h4 style="margin-bottom:12px;font-size:.9rem"><i class="fas fa-user"></i> Dados do Titular</h4>
                    <div class="form-group"><label>CPF do Titular</label><input class="form-control" id="ccCpf" placeholder="000.000.000-00" value="${user.cpf || ''}"></div>
                    <div class="form-group"><label>Email</label><input class="form-control" id="ccEmail" value="${user.email || ''}"></div>
                    <div class="form-group"><label>Telefone</label><input class="form-control" id="ccPhone" value="${user.phone || ''}"></div>
                    <div class="form-row">
                        <div class="form-group"><label>CEP</label><input class="form-control" id="ccPostalCode" placeholder="00000-000"></div>
                        <div class="form-group"><label>Número</label><input class="form-control" id="ccAddressNumber" placeholder="123"></div>
                    </div>
                </div>
            `, `<button class="btn btn-outline" onclick="Layout.closeModal()">Cancelar</button><button class="btn btn-success" onclick="submitCreditCard(${ref}, ${isCustom})"><i class="fas fa-lock"></i> Pagar</button>`);
        }

        function submitCreditCard(ref, isCustom) {
            const ccNumber = (document.getElementById('ccNumber').value || '').replace(/\s/g, '');
            const ccExpiry = document.getElementById('ccExpiry').value || '';
            const ccCvv = document.getElementById('ccCvv').value || '';
            const ccName = document.getElementById('ccName').value || '';
            const [expMonth, expYear] = ccExpiry.split('/');

            if (!ccNumber || ccNumber.length < 13) { Layout.toast('Número do cartão inválido', 'error'); return; }
            if (!expMonth || !expYear) { Layout.toast('Validade inválida', 'error'); return; }
            if (!ccCvv || ccCvv.length < 3) { Layout.toast('CVV inválido', 'error'); return; }
            if (!ccName) { Layout.toast('Nome no cartão — obrigatório', 'error'); return; }

            const cardData = {
                creditCard: {
                    holderName: ccName,
                    number: ccNumber,
                    expiryMonth: expMonth,
                    expiryYear: '20' + expYear,
                    ccv: ccCvv
                },
                creditCardHolderInfo: {
                    name: ccName,
                    email: document.getElementById('ccEmail').value || user.email,
                    cpfCnpj: (document.getElementById('ccCpf').value || '').replace(/\D/g, ''),
                    postalCode: (document.getElementById('ccPostalCode').value || '').replace(/\D/g, ''),
                    addressNumber: document.getElementById('ccAddressNumber').value || 'SN',
                    phone: (document.getElementById('ccPhone').value || '').replace(/\D/g, '')
                }
            };

            processPayment(ref, 'credit_card', isCustom, cardData);
        }

        function copyPixCode(el) {
            navigator.clipboard.writeText(el.textContent).then(() => Layout.toast('Código PIX copiado!', 'success')).catch(() => {});
        }

        function copyBoletoCode(el) {
            navigator.clipboard.writeText(el.textContent).then(() => Layout.toast('Linha digitável copiada!', 'success')).catch(() => {});
        }

        async function checkPaymentStatus(paymentId) {
            const result = await DB.api('GET', `/api/payments/${paymentId}/status`);
            if (!result) { Layout.toast('Erro ao verificar', 'error'); return; }
            if (result.status === 'pago') {
                Layout.toast('Pagamento confirmado! Pacote ativado!', 'success');
                await DB.syncData();
                Layout.closeModal();
                setTimeout(() => location.reload(), 1500);
            } else {
                Layout.toast(`Status: ${result.status}. Aguarde a confirmação.`, 'info');
            }
        }
    </script>
    <script src="/js/pwa.js"></script>
</body>
</html>
