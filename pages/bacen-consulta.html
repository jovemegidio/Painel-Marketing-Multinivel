<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Credbusiness">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>Credbusiness — Consulta Bacen</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="app"></div>
    <template id="page-content">
        <div class="page-header"><h2>Bacen — Consulta de Valores</h2><p>Consulte valores a receber no Banco Central</p></div>
        <div class="grid-2">
            <div class="card">
                <div class="card-header"><h3><i class="fas fa-university"></i> Consultar Bacen</h3></div>
                <div class="card-body">
                    <div class="form-group"><label>CPF / CNPJ</label><input class="form-control" id="bacenDoc" placeholder="000.000.000-00" oninput="lookupBacenDoc(this.value)"></div>
                    <div class="form-group"><label>Data de Nascimento</label><input type="date" class="form-control" id="bacenDate"></div>
                    <button class="btn btn-primary w-full" onclick="consultarBacen()"><i class="fas fa-search"></i> Consultar</button>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><h3><i class="fas fa-question-circle"></i> O que é?</h3></div>
                <div class="card-body">
                    <p style="font-size:.85rem;color:var(--text2);margin-bottom:12px">O Sistema de Valores a Receber (SVR) do Banco Central permite consultar se existem valores esquecidos em bancos e instituições financeiras.</p>
                    <p style="font-size:.85rem;color:var(--text2)">Podem ser consultados: contas correntes/poupança encerradas com saldo, cotas de capital, tarifas cobradas indevidamente, entre outros.</p>
                </div>
            </div>
        </div>
        <div class="card" style="margin-top:24px;display:none" id="bacenResult">
            <div class="card-header"><h3><i class="fas fa-coins"></i> Resultado</h3></div>
            <div class="card-body" id="bacenBody"></div>
        </div>

        <!-- Histórico de consultas Bacen -->
        <div class="card" style="margin-top:24px">
            <div class="card-header"><h3><i class="fas fa-history"></i> Histórico de Consultas Bacen</h3></div>
            <div class="card-body"><div class="table-wrap" id="bacenHistory"></div></div>
        </div>
    </template>
    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script>
        Layout.init({ basePath: '../', page: 'bacen-consulta', title: 'Bacen' });

        let _bacenTimer = null;
        function lookupBacenDoc(value) {
            clearTimeout(_bacenTimer);
            const digits = value.replace(/\D/g, '');
            if (digits.length < 11) return;
            _bacenTimer = setTimeout(async () => {
                try {
                    const r = await DB.api('GET', `/api/services/lookup-cpf?cpf=${encodeURIComponent(value)}`);
                    if (r && r.found && r.birth_date) {
                        document.getElementById('bacenDate').value = r.birth_date;
                        Layout.toast('Data de nascimento preenchida automaticamente', 'info');
                    }
                } catch {}
            }, 400);
        }

        async function consultarBacen() {
            const doc = document.getElementById('bacenDoc').value;
            if (!doc) { Layout.toast('Informe o CPF/CNPJ', 'error'); return; }

            const btn = document.querySelector('.btn-primary');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Consultando...';

            try {
                const result = await DB.api('POST', '/api/services/consultar-bacen', { cpf: doc });
                const resultDiv = document.getElementById('bacenResult');
                resultDiv.style.display = 'block';

                if (!result || result.error) {
                    document.getElementById('bacenBody').innerHTML = `
                        <div style="text-align:center;padding:24px">
                            <div style="font-size:3rem;margin-bottom:8px"><i class="fas fa-exclamation-circle" style="color:var(--danger)"></i></div>
                            <h3 style="font-size:1.1rem;margin-bottom:4px">Erro na Consulta</h3>
                            <p style="font-size:.85rem;color:var(--text3)">${result?.error || result?.mensagem || 'Serviço indisponível. Tente novamente.'}</p>
                        </div>`;
                } else if (result.dados && parseFloat(result.dados.valores_a_receber) > 0) {
                    const val = parseFloat(result.dados.valores_a_receber).toFixed(2);
                    document.getElementById('bacenBody').innerHTML = `
                        <div style="text-align:center;padding:24px">
                            <div style="font-size:3rem;margin-bottom:8px"><i class="fas fa-coins" style="color:var(--warning)"></i></div>
                            <h3 style="font-size:1.3rem;margin-bottom:4px">Valores Encontrados!</h3>
                            <p style="font-size:2rem;font-weight:700;color:var(--success);margin:12px 0">R$ ${val}</p>
                            <p style="font-size:.85rem;color:var(--text3)">Valores a receber de ${result.dados.instituicoes || 0} instituição(ões)</p>
                            <p style="font-size:.78rem;color:var(--text3);margin-top:4px">Última atualização: ${result.dados.ultima_atualizacao || '-'}</p>
                            <button class="btn btn-success" style="margin-top:16px" onclick="solicitarResgate('${doc}', '${val}')"><i class="fas fa-download"></i> Solicitar Resgate</button>
                        </div>`;
                } else {
                    document.getElementById('bacenBody').innerHTML = `
                        <div style="text-align:center;padding:24px">
                            <div style="font-size:3rem;margin-bottom:8px"><i class="fas fa-check-circle" style="color:var(--success)"></i></div>
                            <h3 style="font-size:1.1rem;margin-bottom:4px">Nenhum Valor Encontrado</h3>
                            <p style="font-size:.85rem;color:var(--text3)">Não existem valores a receber para o documento informado</p>
                        </div>`;
                }
                resultDiv.scrollIntoView({ behavior: 'smooth' });
                loadBacenHistory();
            } catch (err) {
                Layout.toast('Erro ao consultar. Tente novamente.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-search"></i> Consultar';
            }
        }

        function solicitarResgate(cpf, valor) {
            const user = Layout.user;
            DB.addProcess({
                userId: user.id, user_id: user.id,
                cpf: cpf, name: user.name,
                type: 'bacen', value: parseFloat(valor),
                institution: 'Banco Central (SVR)',
                status: 'pendente'
            });
            Layout.toast('Processo de resgate aberto com sucesso! Acompanhe em "Meus Processos".', 'success');
            document.querySelector('.btn-success').disabled = true;
            document.querySelector('.btn-success').innerHTML = '<i class="fas fa-check"></i> Processo Aberto';
        }

        async function loadBacenHistory() {
            try {
                const data = await DB.api('GET', '/api/services/consultations');
                const bacenList = (data || []).filter(c => c.type === 'bacen');
                document.getElementById('bacenHistory').innerHTML = bacenList.length ? `<table>
                    <thead><tr><th>CPF/CNPJ</th><th>Valor Encontrado</th><th>Instituições</th><th>Data</th></tr></thead>
                    <tbody>${bacenList.map(c => {
                        const r = c.result || {};
                        const dados = r.dados || {};
                        return `<tr><td>${c.cpf}</td>
                            <td style="font-weight:700;color:var(--success)">R$ ${parseFloat(dados.valores_a_receber || 0).toFixed(2)}</td>
                            <td>${dados.instituicoes || 0}</td>
                            <td>${new Date(c.created_at).toLocaleDateString('pt-BR')}</td></tr>`;
                    }).join('')}</tbody>
                </table>` : '<div class="table-empty"><i class="fas fa-university"></i><p>Nenhuma consulta Bacen realizada</p></div>';
            } catch {}
        }
        loadBacenHistory();
    </script>
    <script src="/js/pwa.js"></script>
</body>
</html>
