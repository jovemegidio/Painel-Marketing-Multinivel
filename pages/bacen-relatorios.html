<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Credbusiness">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>Credbusiness — Bacen Relatórios</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="app"></div>
    <template id="page-content">
        <div class="page-header"><h2>Bacen — Relatórios</h2><p>Histórico completo de consultas ao Banco Central</p></div>

        <div class="stats-grid" id="bacenStats"></div>

        <div class="card" style="margin-top:24px">
            <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
                <h3><i class="fas fa-chart-line"></i> Histórico de Consultas</h3>
                <div style="display:flex;gap:8px">
                    <button class="btn btn-sm btn-outline" onclick="exportBacenPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
                    <button class="btn btn-sm btn-outline" onclick="window.location.href='bacen-consulta.html'"><i class="fas fa-plus"></i> Nova Consulta</button>
                </div>
            </div>
            <div class="card-body"><div class="table-wrap" id="reportTable"></div></div>
        </div>
    </template>
    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script>
        Layout.init({ basePath: '../', page: 'bacen-relatorios', title: 'Bacen Relatórios' });

        async function loadReports() {
            try {
                const data = await DB.api('GET', '/api/services/consultations');
                const bacenList = (data || []).filter(c => c.type === 'bacen');

                const totalConsultas = bacenList.length;
                const totalValor = bacenList.reduce((s, c) => {
                    const r = c.result || {};
                    return s + parseFloat((r.dados || {}).valores_a_receber || 0);
                }, 0);

                document.getElementById('bacenStats').innerHTML = `
                    <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-search"></i></div><div class="stat-info"><h3>${totalConsultas}</h3><p>Total Consultas</p></div></div>
                    <div class="stat-card"><div class="stat-icon green"><i class="fas fa-coins"></i></div><div class="stat-info"><h3>R$ ${fmt(totalValor)}</h3><p>Total Valores Encontrados</p></div></div>
                `;

                document.getElementById('reportTable').innerHTML = bacenList.length ? `<table>
                    <thead><tr><th>#</th><th>CPF/CNPJ</th><th>Valor Encontrado</th><th>Instituições</th><th>Data</th><th>Detalhes</th></tr></thead>
                    <tbody>${bacenList.map((c, i) => {
                        const r = c.result || {};
                        const dados = r.dados || {};
                        const val = parseFloat(dados.valores_a_receber || 0);
                        return `<tr>
                            <td>${i + 1}</td>
                            <td>${c.cpf}</td>
                            <td style="font-weight:700;color:${val > 0 ? 'var(--success)' : 'var(--text3)'}">R$ ${val.toFixed(2)}</td>
                            <td>${dados.instituicoes || 0}</td>
                            <td>${new Date(c.created_at).toLocaleDateString('pt-BR')}</td>
                            <td>${val > 0 ? '<span class="badge badge-success">Valor encontrado</span>' : '<span class="badge badge-secondary">Sem valor</span>'}</td>
                        </tr>`;
                    }).join('')}</tbody>
                </table>` : '<div class="table-empty"><i class="fas fa-chart-line"></i><p>Nenhum relatório disponível</p><small>Faça uma <a href="bacen-consulta.html" style="color:var(--primary)">consulta Bacen</a> para gerar relatórios</small></div>';
            } catch {
                document.getElementById('reportTable').innerHTML = '<div class="table-empty"><i class="fas fa-chart-line"></i><p>Nenhum relatório disponível</p><small>Faça uma <a href="bacen-consulta.html" style="color:var(--primary)">consulta Bacen</a> para gerar relatórios</small></div>';
            }
        }

        let _bacenListForPdf = [];
        const _origLoadReports = loadReports;
        loadReports = async function() {
            await _origLoadReports();
        };

        function exportBacenPDF() {
            const rows = document.querySelectorAll('#reportTable table tbody tr');
            if (!rows.length) { Layout.toast('Nenhum dado para exportar', 'error'); return; }
            const data = Array.from(rows).map(tr => Array.from(tr.cells).map(td => td.textContent.trim()));
            ExportPDF.download('bacen-relatorios', 'Relatório Bacen — Consultas SVR',
                ['#', 'CPF/CNPJ', 'Valor', 'Instituições', 'Data', 'Detalhes'], data
            );
        }
        loadReports();
    </script>
    <script src="/js/pwa.js"></script>
</body>
</html>
