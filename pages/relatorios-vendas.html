<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Credbusiness">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>Credbusiness — Relatório de Vendas</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <div id="app"></div>
    <template id="page-content">
        <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap">
            <div><h2>Relatório de Vendas</h2><p>Acompanhe o desempenho de vendas da sua rede</p></div>
            <button class="btn btn-outline" onclick="exportVendasPDF()"><i class="fas fa-file-pdf"></i> Exportar PDF</button>
        </div>
        <div class="stats-grid" id="salesStats"></div>
        <div class="card" style="margin-top:24px">
            <div class="card-header"><h3><i class="fas fa-chart-area"></i> Vendas dos Últimos 6 Meses</h3></div>
            <div class="card-body"><div style="height:300px"><canvas id="salesChart"></canvas></div></div>
        </div>
    </template>
    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script>
        Layout.init({ basePath: '../', page: 'relatorios-vendas', title: 'Vendas' });
        const user = Layout.user;
        const network = DB.getNetwork(user.id);
        const teamIds = [user.id, ...network.directs.map(d=>d.id), ...network.team.map(t=>t.id)];
        const txs = DB.getTransactions().filter(t => teamIds.includes(t.userId) && t.type === 'compra');
        const totalVendas = txs.reduce((s,t) => s + Math.abs(t.amount), 0);

        document.getElementById('salesStats').innerHTML = [
            { icon: 'fa-chart-line', color: '#28a745', label: 'Vendas Total', value: 'R$ ' + fmt(totalVendas) },
            { icon: 'fa-shopping-bag', color: '#007bff', label: 'Pacotes Vendidos', value: txs.length },
            { icon: 'fa-users', color: '#6366f1', label: 'Membros Rede', value: network.directs.length + network.team.length }
        ].map(s => '<div class="stat-card"><div class="stat-icon" style="background:'+s.color+'20;color:'+s.color+'"><i class="fas '+s.icon+'"></i></div><div class="stat-info"><span class="stat-value">'+s.value+'</span><span class="stat-label">'+s.label+'</span></div></div>').join('');

        const months = [];
        const monthData = [];
        const now = new Date();
        for (let i = 5; i >= 0; i--) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            months.push(d.toLocaleString('pt-BR', { month: 'short', year: '2-digit' }));
            const y = d.getFullYear(), m = d.getMonth();
            const mTxs = txs.filter(t => { const td = new Date(t.date); return td.getFullYear()===y && td.getMonth()===m; });
            monthData.push(mTxs.reduce((s,t) => s + Math.abs(t.amount), 0));
        }

        new Chart(document.getElementById('salesChart').getContext('2d'), {
            type: 'line',
            data: {
                labels: months,
                datasets: [{
                    label: 'Vendas (R$)',
                    data: monthData,
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59,130,246,.08)',
                    fill: true, tension: .4, pointRadius: 4,
                    pointBackgroundColor: '#3b82f6', borderWidth: 2
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { color: '#f1f5f9' }, beginAtZero: true, ticks: { callback: v => 'R$ ' + v } } } }
        });

        function exportVendasPDF() {
            ExportPDF.download('vendas', 'Relatório de Vendas',
                ['Mês', 'Vendas (R$)'],
                months.map((m, i) => [m, 'R$ ' + fmt(monthData[i])]),
                { summary: [{ label: 'Total Vendas', value: 'R$ ' + fmt(totalVendas), color: '#28a745' }, { label: 'Pacotes Vendidos', value: txs.length, color: '#007bff' }, { label: 'Membros Rede', value: network.directs.length + network.team.length, color: '#6366f1' }] }
            );
        }
    </script>
    <script src="/js/pwa.js"></script>
</body>
</html>
