<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Credbusiness">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>Credbusiness — Árvore da Rede</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="app"></div>
    <template id="page-content">
        <div class="page-header"><h2>Árvore da Rede</h2><p>Visualização hierárquica da sua rede de indicações</p></div>
        <div class="card"><div class="card-body tree-container" id="treeContainer"></div></div>
    </template>
    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script>
        Layout.init({ basePath: '../', page: 'rede-arvore', title: 'Árvore' });
        const user = Layout.user;
        const levels = DB.get('levels');
        const tree = DB.getNetworkTree(user.id);

        function renderTree(node) {
            if (!node) return '';
            const l = levels[node.level];
            const bc = node.level === 'diamante' ? 'badge-cyan' : node.level === 'ouro' ? 'badge-yellow' : 'badge-gray';
            let html = `<li><span class="tree-node">${l.icon} <strong>${node.name}</strong> <span class="node-level badge ${bc}">${l.name}</span> <small style="color:var(--text3)">${node.points} pts</small></span>`;
            if (node.children && node.children.length > 0) html += '<ul>' + node.children.map(c => renderTree(c)).join('') + '</ul>';
            html += '</li>';
            return html;
        }

        document.getElementById('treeContainer').innerHTML = tree && tree.children && tree.children.length > 0
            ? `<div class="tree"><ul>${renderTree(tree)}</ul></div>`
            : '<div class="empty-state"><i class="fas fa-sitemap"></i><p>Sua Árvore está vazia</p><small>Indique pessoas para construir sua rede</small></div>';
    </script>
    <script src="/js/pwa.js"></script>
</body>
</html>
