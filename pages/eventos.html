<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Credbusiness">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>Credbusiness — Eventos</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="app"></div>
    <template id="page-content">
        <div class="page-header"><h2>Eventos</h2><p>Próximos eventos e encontros</p></div>
        <div class="tabs" id="eventTabs">
            <div class="tab active" onclick="showTab('proximos')">Próximos</div>
            <div class="tab" onclick="showTab('passados')">Passados</div>
        </div>
        <div id="proximosTab"></div>
        <div id="passadosTab" style="display:none"></div>
    </template>
    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script>
        Layout.init({ basePath: '../', page: 'eventos-agenda', title: 'Eventos' });
        const events = DB.get('events') || [];
        const months = ['', 'Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];

        function renderEvents(list) {
            if (!list.length) return '<div class="empty-state"><i class="fas fa-calendar"></i><p>Nenhum evento</p></div>';
            return `<div style="display:grid;gap:12px">${list.map(e => {
                const parts = e.date.split('-');
                const isFuture = e.date >= new Date().toISOString().split('T')[0];
                const priceTag = e.price > 0 ? `<span class="badge badge-orange">R$ ${fmt(e.price)}</span>` : '<span class="badge badge-green">Grátis</span>';
                return `<div class="event-card">
                    <div class="event-date"><div class="day">${parseInt(parts[2])}</div><div class="month">${months[parseInt(parts[1])]}</div></div>
                    <div class="event-info" style="flex:1">
                        <h4>${e.title}</h4>
                        <p>${e.description}</p>
                        <div class="event-meta"><span><i class="fas fa-clock"></i>${e.time}</span><span><i class="fas fa-map-marker-alt"></i>${e.location}</span><span class="badge badge-${e.type==='online'?'blue':'green'}">${e.type}</span>${priceTag}</div>
                        ${isFuture ? `<button class="btn btn-primary btn-sm mt-8" onclick="buyTicket(${e.id}, '${e.title.replace(/'/g,"\\'")}')"><i class="fas fa-ticket-alt"></i> Adquirir Ingresso</button>` : ''}
                    </div>
                </div>`;
            }).join('')}</div>`;
        }

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('proximosTab').innerHTML = renderEvents(events.filter(e => e.date >= today));
        document.getElementById('passadosTab').innerHTML = renderEvents(events.filter(e => e.date < today));

        function showTab(tab) {
            document.querySelectorAll('#eventTabs .tab').forEach((t, i) => t.classList.toggle('active', i === (tab === 'proximos' ? 0 : 1)));
            document.getElementById('proximosTab').style.display = tab === 'proximos' ? 'block' : 'none';
            document.getElementById('passadosTab').style.display = tab === 'passados' ? 'block' : 'none';
        }

        async function buyTicket(eventId, title) {
            if (!confirm(`Adquirir ingresso para "${title}"?`)) return;
            Layout.toast('Processando...', 'info');
            const result = await DB.api('POST', `/api/wallet/events/${eventId}/buy`, { quantity: 1 });
            if (!result) { Layout.toast('Erro de conexão', 'error'); return; }
            if (result.error) { Layout.toast(result.error, 'error'); return; }
            Layout.toast(result.message || 'Ingresso adquirido!', 'success');
        }
    </script>
    <script src="/js/pwa.js"></script>
</body>
</html>
