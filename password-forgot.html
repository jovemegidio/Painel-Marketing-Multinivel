<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credbusiness — Recuperar Senha</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <!-- Brand -->
        <div class="login-brand">
            <div class="brand-icon"><img src="css/logo.png" alt="Credbusiness"></div>
            <h2>Recuperar Senha</h2>
            <p>Informe seus dados para redefinir sua senha</p>
        </div>

        <form id="recoverForm" onsubmit="doRecover(event)">
            <div class="form-group">
                <label><i class="fas fa-user" style="margin-right:6px;opacity:.4"></i>Usuário</label>
                <input type="text" class="form-control" id="recUser" placeholder="Seu nome de usuário" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope" style="margin-right:6px;opacity:.4"></i>E-mail</label>
                <input type="email" class="form-control" id="recEmail" placeholder="E-mail cadastrado" required>
            </div>
            <button type="submit" class="btn btn-primary w-full" id="recBtn" style="padding:12px;font-size:.95rem">
                <span class="btn-text">Recuperar Senha</span>
                <i class="fas fa-spinner fa-spin" style="display:none"></i>
            </button>
        </form>

        <!-- Success message (hidden) -->
        <div id="successMsg" style="display:none;text-align:center;padding:20px 0">
            <div style="width:64px;height:64px;border-radius:50%;background:var(--success-bg);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px">
                <i class="fas fa-envelope" style="font-size:1.5rem;color:var(--success)"></i>
            </div>
            <h3 style="margin-bottom:8px">E-mail Enviado!</h3>
            <p style="color:var(--text3);font-size:.875rem;margin-bottom:4px">Se os dados informados estiverem corretos, você receberá um email com um link para redefinir sua senha.</p>
            <p style="color:var(--text3);font-size:.82rem;margin-top:12px"><i class="fas fa-clock" style="margin-right:4px;opacity:.5"></i>O link expira em <strong>1 hora</strong>.</p>
            <p style="color:var(--text3);font-size:.78rem;margin-top:8px">Não recebeu? Verifique a pasta de spam ou tente novamente.</p>
        </div>

        <div class="login-footer">
            <a href="login.html"><i class="fas fa-arrow-left" style="margin-right:4px"></i> Voltar ao login</a>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="js/data.js"></script>
<script>
    DB.init();
    const _s = DB.getSettings();
    document.title = (_s.siteName||'Credbusiness') + ' — Recuperar Senha';
    // Logo is now an image, no need to set text

    async function doRecover(e) {
        e.preventDefault();
        const btn = document.getElementById('recBtn');
        btn.querySelector('.btn-text').style.display = 'none';
        btn.querySelector('.fa-spin').style.display = 'inline-block';
        btn.disabled = true;

        try {
            const result = await DB.recoverPassword(
                document.getElementById('recUser').value.toLowerCase().trim(),
                document.getElementById('recEmail').value.trim()
            );

            if (result.success) {
                document.getElementById('recoverForm').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
            } else {
                showToast(result.error || 'Erro ao recuperar senha', 'error');
                btn.querySelector('.btn-text').style.display = 'inline';
                btn.querySelector('.fa-spin').style.display = 'none';
                btn.disabled = false;
            }
        } catch (err) {
            showToast('Erro de conexão com o servidor.', 'error');
            btn.querySelector('.btn-text').style.display = 'inline';
            btn.querySelector('.fa-spin').style.display = 'none';
            btn.disabled = false;
        }
    }

    function showToast(msg, type) {
        const c = document.getElementById('toastContainer');
        const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
        const el = document.createElement('div');
        el.className = 'toast ' + type;
        el.innerHTML = `<i class="fas ${icons[type]||icons.info}"></i><span>${msg}</span>`;
        c.appendChild(el);
        setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3500);
    }
</script>
</body>
</html>
