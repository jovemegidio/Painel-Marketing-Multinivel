<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credbusiness — Entrar</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <!-- Brand -->
        <div class="login-brand">
            <div class="brand-icon"><img src="css/logo.png" alt="Credbusiness"></div>
            <h2>Bem-vindo de volta</h2>
            <p>Acesse seu escritório virtual</p>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('user')">Usuário</button>
            <button class="auth-tab" onclick="switchTab('admin')">Administrador</button>
        </div>

        <!-- User Login -->
        <form id="userForm" onsubmit="doLogin(event,'user')">
            <div class="form-group">
                <label><i class="fas fa-user" style="margin-right:6px;opacity:.4"></i>Usuário</label>
                <input type="text" class="form-control" id="userUsername" placeholder="Seu nome de usuário" required autocomplete="username">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock" style="margin-right:6px;opacity:.4"></i>Senha</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="userPassword" placeholder="Sua senha" required autocomplete="current-password">
                    <button type="button" class="input-group-btn" onclick="togglePass('userPassword',this)"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-full" id="userBtn" style="padding:12px;font-size:.95rem">
                <span class="btn-text">Entrar</span>
                <i class="fas fa-spinner fa-spin" style="display:none"></i>
            </button>
        </form>

        <!-- 2FA Step (hidden) -->
        <form id="twoFAForm" onsubmit="verify2FA(event)" style="display:none">
            <div style="text-align:center;margin-bottom:16px">
                <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,rgba(99,102,241,0.1),rgba(79,70,229,0.1));display:inline-flex;align-items:center;justify-content:center;margin-bottom:8px">
                    <i class="fas fa-shield-halved" style="font-size:1.2rem;color:var(--primary)"></i>
                </div>
                <h3 style="font-size:1rem;margin:0 0 4px">Autenticação em Dois Fatores</h3>
                <p style="font-size:.82rem;color:var(--text3);margin:0">Informe o código do seu app autenticador</p>
            </div>
            <div class="form-group">
                <label><i class="fas fa-key" style="margin-right:6px;opacity:.4"></i>Código 2FA</label>
                <input type="text" class="form-control" id="totpCode" placeholder="000000" required maxlength="6" pattern="\d{6}" inputmode="numeric" autocomplete="one-time-code" style="text-align:center;font-size:1.3rem;letter-spacing:8px;font-weight:600">
            </div>
            <button type="submit" class="btn btn-primary w-full" id="twoFABtn" style="padding:12px;font-size:.95rem">
                <span class="btn-text">Verificar</span>
                <i class="fas fa-spinner fa-spin" style="display:none"></i>
            </button>
            <div style="text-align:center;margin-top:12px">
                <a href="#" onclick="cancel2FA();return false" style="font-size:.82rem;color:var(--text3)"><i class="fas fa-arrow-left" style="margin-right:4px"></i>Voltar</a>
            </div>
        </form>

        <!-- Admin Login (hidden) -->
        <form id="adminForm" onsubmit="doLogin(event,'admin')" style="display:none">
            <div class="form-group">
                <label><i class="fas fa-shield-halved" style="margin-right:6px;opacity:.4"></i>Usuário Admin</label>
                <input type="text" class="form-control" id="adminUsername" placeholder="admin" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock" style="margin-right:6px;opacity:.4"></i>Senha</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="adminPassword" placeholder="Senha do administrador" required>
                    <button type="button" class="input-group-btn" onclick="togglePass('adminPassword',this)"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-full" id="adminBtn" style="padding:12px;font-size:.95rem;background:linear-gradient(135deg,#ef4444,#dc2626);box-shadow:0 4px 14px rgba(239,68,68,.25)">
                <span class="btn-text">Entrar como Admin</span>
                <i class="fas fa-spinner fa-spin" style="display:none"></i>
            </button>
        </form>

        <!-- Footer links -->
        <div class="login-footer">
            <a href="password-forgot.html">Esqueceu sua senha?</a>
            <span style="margin:0 8px;color:var(--border)">•</span>
            <a href="register.html">Cadastre-se</a>
        </div>
    </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script src="js/data.js"></script>
<script>
    // Clear stale auth data on login page load (prevents redirect loops)
    (function cleanupStaleAuth() {
        const token = localStorage.getItem('credbusiness_token');
        if (token) {
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                if (!payload.exp || payload.exp * 1000 < Date.now()) {
                    localStorage.removeItem('credbusiness_token');
                    localStorage.removeItem('credbusiness_currentUser');
                    return;
                }
            } catch {
                localStorage.removeItem('credbusiness_token');
                localStorage.removeItem('credbusiness_currentUser');
                return;
            }
        }
    })();

    // Check if already logged
    DB.init();
    const cur = DB.getCurrentUser();
    if (cur) window.location.href = cur.role === 'admin' ? 'admin/index.html' : 'pages/dashboard.html';

    // Apply dynamic branding
    const _s = DB.getSettings();
    document.title = _s.siteTitle || 'Credbusiness — Entrar';
    // Logo is now an image, no need to set text

    let pending2FAToken = null;

    function switchTab(tab) {
        document.querySelectorAll('.auth-tab').forEach((t, i) => {
            t.classList.toggle('active', (tab === 'user' && i === 0) || (tab === 'admin' && i === 1));
        });
        document.getElementById('userForm').style.display = tab === 'user' ? 'block' : 'none';
        document.getElementById('adminForm').style.display = tab === 'admin' ? 'block' : 'none';
        document.getElementById('twoFAForm').style.display = 'none';
        document.querySelector('.auth-tabs').style.display = '';
    }

    function togglePass(id, btn) {
        const inp = document.getElementById(id);
        const show = inp.type === 'password';
        inp.type = show ? 'text' : 'password';
        btn.querySelector('i').className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
    }

    async function doLogin(e, type) {
        e.preventDefault();
        const btn = e.target.querySelector('button[type=submit]');
        const text = btn.querySelector('.btn-text');
        const spin = btn.querySelector('.fa-spin');
        text.style.display = 'none';
        spin.style.display = 'inline-block';
        btn.disabled = true;

        try {
            let result;
            if (type === 'user') {
                const u = document.getElementById('userUsername').value.toLowerCase().trim();
                const p = document.getElementById('userPassword').value;
                result = await DB.login(u, p);
            } else {
                const u = document.getElementById('adminUsername').value.toLowerCase().trim();
                const p = document.getElementById('adminPassword').value;
                result = await DB.adminLogin(u, p);
            }

            if (result.success && result.requires2FA) {
                // Mostrar etapa 2FA
                pending2FAToken = result.tempToken;
                document.getElementById('userForm').style.display = 'none';
                document.getElementById('adminForm').style.display = 'none';
                document.querySelector('.auth-tabs').style.display = 'none';
                document.getElementById('twoFAForm').style.display = 'block';
                document.getElementById('totpCode').focus();
                text.style.display = 'inline';
                spin.style.display = 'none';
                btn.disabled = false;
                return;
            }

            if (result.success) {
                showToast('Login realizado com sucesso!', 'success');
                setTimeout(() => {
                    window.location.href = type === 'admin' ? 'admin/index.html' : 'pages/dashboard.html';
                }, 600);
            } else {
                showToast(result.error || 'Usuário ou senha inválidos.', 'error');
                text.style.display = 'inline';
                spin.style.display = 'none';
                btn.disabled = false;
            }
        } catch (err) {
            showToast('Erro de conexão com o servidor.', 'error');
            text.style.display = 'inline';
            spin.style.display = 'none';
            btn.disabled = false;
        }
    }

    async function verify2FA(e) {
        e.preventDefault();
        const btn = document.getElementById('twoFABtn');
        const text = btn.querySelector('.btn-text');
        const spin = btn.querySelector('.fa-spin');
        text.style.display = 'none';
        spin.style.display = 'inline-block';
        btn.disabled = true;

        try {
            const code = document.getElementById('totpCode').value.trim();
            const result = await DB.verify2FA(pending2FAToken, code);

            if (result.success) {
                showToast('Login realizado com sucesso!', 'success');
                setTimeout(() => { window.location.href = 'pages/dashboard.html'; }, 600);
            } else {
                showToast(result.error || 'Código inválido.', 'error');
                document.getElementById('totpCode').value = '';
                document.getElementById('totpCode').focus();
                text.style.display = 'inline';
                spin.style.display = 'none';
                btn.disabled = false;
            }
        } catch (err) {
            showToast('Erro de conexão com o servidor.', 'error');
            text.style.display = 'inline';
            spin.style.display = 'none';
            btn.disabled = false;
        }
    }

    function cancel2FA() {
        pending2FAToken = null;
        document.getElementById('twoFAForm').style.display = 'none';
        document.getElementById('userForm').style.display = 'block';
        document.querySelector('.auth-tabs').style.display = '';
        document.getElementById('totpCode').value = '';
    }

    function showToast(msg, type) {
        const c = document.getElementById('toastContainer');
        const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
        const el = document.createElement('div');
        el.className = 'toast ' + type;
        el.innerHTML = `<i class="fas ${icons[type]||icons.info}"></i><span>${msg}</span>`;
        c.appendChild(el);
        setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3500);
    }
</script>
</body>
</html>
